<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #5B4FE8; --brand-light: #EEF0FF; --brand-dark: #4338CA;
      --surface: #ffffff; --surface-2: #F7F8FA; --surface-3: #F0F1F5;
      --border: #E4E6EE; --border-strong: #C9CCDA;
      --text-1: #0F1117; --text-2: #5A5F72; --text-3: #9499AD;
      --red: #EF4444; --red-bg: #FEF2F2; --red-text: #991B1B;
      --amber: #F59E0B; --amber-bg: #FFFBEB; --amber-text: #92400E;
      --green: #10B981; --green-bg: #ECFDF5; --green-text: #065F46;
      --blue: #3B82F6; --blue-bg: #EFF6FF; --blue-text: #1E40AF;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --sidebar-w: 232px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
    }
    body { font-family:'Inter',sans-serif; background:var(--surface-2); color:var(--text-1); height:100vh; overflow:hidden; display:flex; font-size:13px; line-height:1.5; }

    /* ── Sidebar ── */
    #sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:width .2s ease,min-width .2s ease; overflow:hidden; }
    #sidebar.collapsed { width:0; min-width:0; }
    #sidebar-top { padding:20px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .logo { display:flex; align-items:center; gap:10px; margin-bottom:16px; white-space:nowrap; }
    .logo-mark { width:32px; height:32px; border-radius:9px; background:var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-text { font-size:16px; font-weight:600; color:var(--text-1); letter-spacing:-.3px; }
    #cloud-badge { display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:var(--radius-sm); background:var(--surface-2); font-size:11px; font-weight:500; color:var(--text-3); white-space:nowrap; }
    .cloud-dot { width:6px; height:6px; border-radius:50%; background:#C9CCDA; flex-shrink:0; }
    .cloud-dot.green { background:var(--green); }
    .cloud-dot.blue  { background:var(--blue); animation:pulse 1.5s infinite; }
    .cloud-dot.red   { background:var(--red); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    #sidebar-nav { flex:1; overflow-y:auto; padding:12px 10px; }
    .nav-section-label { font-size:10px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.8px; padding:8px 8px 4px; white-space:nowrap; }
    .nav-btn { width:100%; text-align:left; background:none; border:none; cursor:pointer; padding:7px 10px; border-radius:var(--radius-sm); font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:8px; transition:background .12s,color .12s; white-space:nowrap; font-family:inherit; }
    .nav-btn:hover { background:var(--surface-2); color:var(--text-1); }
    .nav-btn.active { background:var(--brand-light); color:var(--brand); font-weight:500; }
    .nav-dot { width:7px; height:7px; border-radius:50%; background:var(--border-strong); flex-shrink:0; }
    .nav-btn.active .nav-dot { background:var(--brand); }
    .live-dot { width:7px; height:7px; border-radius:50%; background:var(--red); flex-shrink:0; animation:pulse 1.5s infinite; }
    .proj-row { display:flex; align-items:center; gap:2px; width:100%; }
    .proj-btn { flex:1; text-align:left; background:none; border:none; cursor:pointer; padding:7px 10px; border-radius:var(--radius-sm); font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:8px; transition:background .12s,color .12s; white-space:nowrap; font-family:inherit; }
    .proj-btn:hover { background:var(--surface-2); color:var(--text-1); }
    .proj-btn.active { background:var(--brand-light); color:var(--brand); font-weight:500; }
    .proj-btn.active .nav-dot { background:var(--brand); }
    .proj-more { background:none; border:none; cursor:pointer; padding:4px 6px; border-radius:var(--radius-sm); color:var(--text-3); font-size:14px; opacity:0; transition:opacity .1s; font-family:inherit; flex-shrink:0; }
    .proj-row:hover .proj-more { opacity:1; }
    .proj-more:hover { background:var(--surface-3); color:var(--text-2); }
    #sidebar-footer { padding:12px 10px; border-top:1px solid var(--border); flex-shrink:0; }
    .user-card { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius-md); cursor:pointer; transition:background .12s; }
    .user-card:hover { background:var(--surface-2); }
    .user-av { width:34px; height:34px; border-radius:50%; background:var(--brand); color:#fff; font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .user-av img { width:100%; height:100%; object-fit:cover; }
    .user-name { font-size:13px; font-weight:500; color:var(--text-1); }
    .user-email { font-size:11px; color:var(--text-3); }

    /* ── Main ── */
    #main { flex:1; min-width:0; display:flex; flex-direction:column; }
    #topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:12px; }
    #topbar-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .toggle-sidebar-btn { background:none; border:none; cursor:pointer; padding:6px; border-radius:var(--radius-sm); color:var(--text-3); display:flex; align-items:center; flex-shrink:0; }
    .toggle-sidebar-btn:hover { background:var(--surface-2); color:var(--text-2); }
    #page-title { font-size:15px; font-weight:600; color:var(--text-1); white-space:nowrap; }
    .overdue-badge { display:none; align-items:center; gap:5px; font-size:11px; font-weight:500; color:var(--red-text); background:var(--red-bg); padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .overdue-badge.show { display:flex; }
    #topbar-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .view-switcher { display:flex; align-items:center; gap:4px; }
    .view-icon-btn { display:flex; align-items:center; gap:0; background:none; border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; padding:6px 8px; color:var(--text-3); font-size:12px; font-weight:500; font-family:inherit; transition:all .18s ease; white-space:nowrap; overflow:hidden; max-width:32px; }
    .view-icon-btn svg { flex-shrink:0; }
    .view-icon-btn .vib-label { max-width:0; overflow:hidden; opacity:0; transition:max-width .18s ease,opacity .15s ease,margin .18s ease; margin-left:0; }
    .view-icon-btn:hover { max-width:120px; color:var(--brand); border-color:var(--brand); background:var(--brand-light); }
    .view-icon-btn:hover .vib-label { max-width:80px; opacity:1; margin-left:6px; }
    .view-icon-btn.active { background:var(--brand); color:#fff; border-color:var(--brand); max-width:120px; }
    .view-icon-btn.active .vib-label { max-width:80px; opacity:1; margin-left:6px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; cursor:pointer; border:none; transition:background .12s; font-family:inherit; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-primary:hover { background:var(--brand-dark); }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--text-2); }
    .btn-ghost:hover { background:var(--surface-2); }
    .btn-sm { padding:5px 12px; font-size:12px; }
    .btn-cancel { background:none; border:1px solid var(--border); color:var(--text-2); }
    .btn-danger { background:var(--red-bg); color:var(--red-text); border:none; }
    .btn-danger:hover { background:#fecaca; }

    /* ── Views ── */
    #content { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .view { display:none; flex:1; overflow:auto; padding:20px 24px 110px; flex-direction:column; }
    .view.active { display:flex; }
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; flex-shrink:0; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 16px; }
    .stat-label { font-size:11px; font-weight:500; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .stat-val { font-size:26px; font-weight:600; color:var(--text-1); line-height:1; }

    /* ── Table ── */
    .table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:max-content; }
    thead tr { background:var(--surface-2); border-bottom:1px solid var(--border); }
    th { padding:9px 12px; font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; user-select:none; }
    .th-inner { display:flex; align-items:center; gap:4px; }
    .th-sort { cursor:pointer; } .th-sort:hover { color:var(--brand); }
    .sort-icon { font-size:10px; color:var(--text-3); } .sort-icon.active { color:var(--brand); }
    .th-filter { font-size:9px; color:var(--text-3); cursor:pointer; padding:1px 3px; border-radius:3px; }
    .th-filter:hover,.th-filter.active { color:var(--brand); background:var(--brand-light); }
    .th-edit { font-size:11px; color:var(--text-3); cursor:pointer; opacity:0; padding:1px 4px; border-radius:3px; }
    th:hover .th-edit { opacity:1; } .th-edit:hover { color:var(--brand); background:var(--brand-light); }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface-2); }
    tbody tr.overdue-row { background:#FFF8F8; } tbody tr.overdue-row:hover { background:var(--red-bg); }
    tbody tr.dragging { opacity:.4; } tbody tr.drag-over td { border-top:2px solid var(--brand) !important; }
    td { padding:0; border:none; }
    .row-num { font-size:11px; color:var(--text-3); text-align:center; width:36px; padding:8px 4px; cursor:grab; }
    .cell-in { width:100%; background:none; border:1px solid transparent; border-radius:var(--radius-sm); padding:4px 7px; font-size:13px; color:var(--text-1); font-family:inherit; outline:none; transition:border .12s,background .12s; }
    .cell-in:hover { border-color:var(--border); }
    .cell-in:focus { border-color:var(--brand); background:var(--brand-light); }
    .cell-task { font-weight:500; }
    .expand-btn { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:11px; padding:2px 3px; border-radius:3px; flex-shrink:0; }
    .expand-btn:hover { color:var(--brand); background:var(--brand-light); }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap; }
    .badge-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .badge select { background:none; border:none; outline:none; font-size:11px; font-weight:500; cursor:pointer; padding:0; font-family:inherit; appearance:none; -webkit-appearance:none; }
    .s-todo { background:var(--surface-3); color:var(--text-2); } .s-todo .badge-dot { background:var(--text-3); } .s-todo select { color:var(--text-2); }
    .s-progress { background:var(--blue-bg); color:var(--blue-text); } .s-progress .badge-dot { background:var(--blue); } .s-progress select { color:var(--blue-text); }
    .s-waiting { background:var(--amber-bg); color:var(--amber-text); } .s-waiting .badge-dot { background:var(--amber); } .s-waiting select { color:var(--amber-text); }
    .s-done { background:var(--green-bg); color:var(--green-text); } .s-done .badge-dot { background:var(--green); } .s-done select { color:var(--green-text); }
    .p-high { background:var(--red-bg); color:var(--red-text); } .p-high .badge-dot { background:var(--red); } .p-high select { color:var(--red-text); }
    .p-medium { background:var(--amber-bg); color:var(--amber-text); } .p-medium .badge-dot { background:var(--amber); } .p-medium select { color:var(--amber-text); }
    .p-low { background:var(--green-bg); color:var(--green-text); } .p-low .badge-dot { background:var(--green); } .p-low select { color:var(--green-text); }
    .overdue-date { color:var(--red) !important; font-weight:600; }
    .action-btn { background:none; border:none; cursor:pointer; color:var(--text-3); padding:4px 7px; border-radius:var(--radius-sm); font-size:16px; line-height:1; }
    .action-btn:hover { background:var(--surface-3); color:var(--text-2); }
    .action-menu-wrap { position:relative; display:inline-block; }
    .action-menu { position:absolute; right:0; top:calc(100% + 4px); z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-md); padding:4px; min-width:150px; }
    .action-item { display:flex; align-items:center; gap:8px; width:100%; background:none; border:none; padding:7px 10px; border-radius:var(--radius-sm); font-size:12px; color:var(--text-2); cursor:pointer; text-align:left; transition:background .1s; font-family:inherit; }
    .action-item:hover { background:var(--surface-2); color:var(--text-1); }
    .action-item.danger { color:var(--red-text); } .action-item.danger:hover { background:var(--red-bg); }
    .action-item:disabled { opacity:.35; pointer-events:none; }
    .menu-sep { height:1px; background:var(--border); margin:3px 0; }
    .subtask-td { padding:4px 12px 10px 48px !important; background:var(--surface-2) !important; }
    .subtask-row { display:flex; align-items:center; gap:8px; padding:3px 0; }
    .subtask-cb { width:14px; height:14px; accent-color:var(--brand); flex-shrink:0; cursor:pointer; }
    .subtask-in { flex:1; background:none; border:1px solid transparent; border-radius:4px; padding:2px 6px; font-size:12px; color:var(--text-1); font-family:inherit; outline:none; }
    .subtask-in:focus { border-color:var(--brand); background:var(--brand-light); }
    .subtask-del { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:12px; padding:2px 4px; border-radius:3px; }
    .subtask-del:hover { color:var(--red); background:var(--red-bg); }
    .subtask-add { background:none; border:none; cursor:pointer; font-size:11px; color:var(--brand); padding:3px 0; margin-top:4px; font-family:inherit; }
    .subtask-add:hover { text-decoration:underline; }
    .add-col-btn { background:none; border:none; cursor:pointer; font-size:16px; color:var(--text-3); padding:2px 6px; border-radius:var(--radius-sm); }
    .add-col-btn:hover { color:var(--brand); background:var(--brand-light); }
    th.col-dragging { opacity:.35; }
    th.col-drag-over { box-shadow:inset 3px 0 0 var(--brand); background:var(--brand-light); }
    .filter-menu { position:absolute; top:calc(100% + 4px); left:0; z-index:60; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-md); padding:6px; min-width:160px; }
    .filter-lbl { display:flex; align-items:center; gap:7px; padding:5px 6px; font-size:12px; color:var(--text-2); cursor:pointer; border-radius:var(--radius-sm); }
    .filter-lbl:hover { background:var(--surface-2); }
    .filter-lbl input { accent-color:var(--brand); }
    .filter-clear { font-size:11px; color:var(--red-text); background:none; border:none; cursor:pointer; padding:4px 6px; width:100%; text-align:left; border-radius:var(--radius-sm); margin-top:2px; font-family:inherit; }
    .filter-clear:hover { background:var(--red-bg); }

    /* Multi-assignee */
    .assignee-chips { display:flex; flex-wrap:wrap; gap:3px; padding:6px 12px; align-items:center; }
    .chip { display:inline-flex; align-items:center; gap:3px; background:var(--brand-light); color:var(--brand); border-radius:20px; padding:2px 8px 2px 5px; font-size:11px; font-weight:500; }
    .chip-av { width:16px; height:16px; border-radius:50%; background:var(--brand); color:#fff; font-size:8px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .chip-del { background:none; border:none; cursor:pointer; font-size:10px; color:var(--brand); padding:0 0 0 2px; line-height:1; }
    .chip-del:hover { color:var(--red); }
    .chip-add { background:none; border:1px dashed var(--border); border-radius:20px; padding:2px 8px; font-size:11px; color:var(--text-3); cursor:pointer; white-space:nowrap; }
    .chip-add:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }
    .assignee-dropdown { position:absolute; top:calc(100% + 2px); left:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-md); padding:6px; min-width:180px; }
    .assignee-opt { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px; color:var(--text-2); }
    .assignee-opt:hover { background:var(--surface-2); }
    .assignee-opt-av { width:22px; height:22px; border-radius:50%; background:var(--brand-light); color:var(--brand); font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .assignee-opt-check { margin-left:auto; color:var(--brand); font-size:12px; }
    .assignee-custom-input { width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; font-family:inherit; outline:none; margin-bottom:4px; }
    .assignee-custom-input:focus { border-color:var(--brand); }

    /* ── Board ── */
    #board-view { flex-direction:row !important; overflow-x:auto; overflow-y:hidden; padding:20px 24px !important; gap:16px; align-items:flex-start; }
    .board-col { flex-shrink:0; width:280px; display:flex; flex-direction:column; gap:8px; }
    .board-col-head { display:flex; align-items:center; justify-content:space-between; padding:8px 4px; }
    .board-col-title { font-size:12px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; gap:8px; }
    .board-col-count { background:var(--surface-3); color:var(--text-3); font-size:11px; font-weight:500; padding:1px 7px; border-radius:20px; }
    .board-col-body { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:8px; min-height:200px; display:flex; flex-direction:column; gap:6px; transition:background .15s,border-color .15s; }
    .board-col-body.drag-over { background:var(--brand-light); border-color:var(--brand); }
    .board-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px; cursor:pointer; transition:box-shadow .15s,border-color .15s; }
    .board-card:hover { box-shadow:var(--shadow-md); border-color:var(--border-strong); }
    .board-card.dragging { opacity:.4; }
    .board-card-title { font-size:13px; font-weight:500; color:var(--text-1); line-height:1.4; margin-bottom:8px; }
    .board-card-foot { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
    .board-card-assignees { display:flex; }
    .board-av { width:20px; height:20px; border-radius:50%; background:var(--brand-light); color:var(--brand); font-size:8px; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid var(--surface); margin-left:-4px; }
    .board-av:first-child { margin-left:0; }
    .board-card-due { font-size:11px; color:var(--text-3); }
    .board-card-due.overdue { color:var(--red); font-weight:600; }
    .board-add-btn { background:none; border:1px dashed var(--border); border-radius:var(--radius-md); padding:8px; font-size:12px; color:var(--text-3); cursor:pointer; text-align:center; width:100%; transition:all .12s; font-family:inherit; }
    .board-add-btn:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

    /* ── Live ── */
    #live-view { flex-direction:column; }
    .live-header { text-align:center; margin-bottom:24px; flex-shrink:0; }
    .live-header h2 { font-size:22px; font-weight:600; color:var(--text-1); margin-bottom:4px; }
    .live-header p { font-size:13px; color:var(--text-3); }
    .live-my-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:20px; max-width:720px; width:100%; align-self:center; flex-shrink:0; }
    .live-my-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .live-my-head h3 { font-size:14px; font-weight:600; }
    .live-my-status { display:flex; align-items:center; gap:14px; background:var(--surface-2); border-radius:var(--radius-md); padding:12px 16px; }
    .live-avatar-wrap { position:relative; flex-shrink:0; }
    .live-avatar { width:48px; height:48px; border-radius:50%; background:var(--brand); color:#fff; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:center; border:2px solid var(--surface); overflow:hidden; }
    .live-avatar img { width:100%; height:100%; object-fit:cover; }
    .live-online-dot { position:absolute; bottom:-1px; right:-1px; width:14px; height:14px; background:var(--green); border:2px solid var(--surface); border-radius:50%; }
    .live-online-dot::before { content:''; position:absolute; inset:-3px; border-radius:50%; background:var(--green); opacity:.35; animation:liveRing 2s ease-out infinite; }
    @keyframes liveRing { 0%{transform:scale(1);opacity:.35}100%{transform:scale(2.2);opacity:0} }
    .live-my-name { font-size:13px; font-weight:600; color:var(--text-1); }

    .live-member-av { width:40px; height:40px; border-radius:50%; background:var(--surface-3); color:var(--text-2); font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; }
    .status-dot { position:absolute; bottom:-1px; right:-1px; width:10px; height:10px; border:2px solid var(--surface); border-radius:50%; }
    .status-dot.active { background:var(--green); }
    .status-dot.idle { background:var(--amber); }
    .status-dot.offline { background:var(--border-strong); }
    .live-member-name { font-size:13px; font-weight:500; color:var(--text-1); }
    .live-member-time { font-size:11px; color:var(--text-3); }
    .live-task-box { background:var(--surface-2); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; border-left:3px solid transparent; }
    .live-task-box.has-task { border-left-color:var(--brand); }
    .live-task-box-label { font-size:10px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
    .live-task-box-text { color:var(--text-2); line-height:1.4; }
    .live-task-box-empty { color:var(--text-3); font-style:italic; }
    .live-task-modal-item { width:100%; text-align:left; background:none; border:1px solid var(--border); border-radius:var(--radius-md); padding:10px 14px; margin-bottom:6px; cursor:pointer; transition:all .12s; font-family:inherit; display:block; }

    .live-task-modal-item span { font-size:11px; color:var(--text-3); }

    /* ── AI Command bar ── */
    #cmd-bar { position:fixed; bottom:0; left:var(--sidebar-w); right:0; padding:12px 24px 16px; background:linear-gradient(to top,var(--surface-2) 70%,transparent); pointer-events:none; transition:left .2s ease; }
    #sidebar.collapsed ~ #main #cmd-bar { left:0; }
    .cmd-outer { max-width:680px; margin:0 auto; pointer-events:all; }
    .cmd-inner { background:var(--surface); border:1.5px solid var(--brand); border-radius:16px; box-shadow:0 0 0 4px rgba(91,79,232,.08), var(--shadow-md); display:flex; align-items:center; gap:0; overflow:hidden; }
    .cmd-ai-icon { display:flex; align-items:center; justify-content:center; padding:0 12px; flex-shrink:0; }
    .cmd-ai-spark { width:28px; height:28px; border-radius:8px; background:var(--brand); display:flex; align-items:center; justify-content:center; }
    #cmd-input { flex:1; background:none; border:none; outline:none; font-size:13px; color:var(--text-1); font-family:inherit; padding:13px 8px; }

    .cmd-chip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:11px; color:var(--text-2); cursor:pointer; transition:all .12s; white-space:nowrap; }
    .cmd-chip:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

    /* ── Modals ── */
    .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(15,17,23,.4); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal { background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); box-shadow:var(--shadow-md); width:100%; max-width:480px; animation:modalIn .15s ease-out; }
    .modal.wide { max-width:560px; }
    @keyframes modalIn { from{opacity:0;transform:scale(.97) translateY(6px)} to{opacity:1;transform:none} }
    .modal-head { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-size:15px; font-weight:600; }
    .modal-close { background:none; border:none; cursor:pointer; font-size:18px; color:var(--text-3); line-height:1; padding:2px 5px; border-radius:4px; }
    .modal-close:hover { color:var(--text-1); background:var(--surface-2); }
    .modal-body { padding:18px 20px; display:flex; flex-direction:column; gap:14px; max-height:65vh; overflow-y:auto; }
    .modal-foot { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .modal-foot-right { display:flex; gap:8px; }
    .field-label { font-size:12px; font-weight:500; color:var(--text-2); display:block; margin-bottom:5px; }
    .field-input { width:100%; padding:8px 11px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; color:var(--text-1); outline:none; background:var(--surface); }
    .field-input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(91,79,232,.1); }
    .field-hint { font-size:11px; color:var(--text-3); }
    .avatar-upload { display:flex; align-items:center; gap:14px; }
    .avatar-preview { width:56px; height:56px; border-radius:50%; background:var(--brand); color:#fff; font-size:20px; font-weight:600; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; }
    .avatar-upload-btn { font-size:12px; color:var(--brand); background:none; border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 12px; cursor:pointer; font-family:inherit; }
    .avatar-upload-btn:hover { background:var(--brand-light); border-color:var(--brand); }
    .color-swatch-row { display:flex; gap:6px; flex-wrap:wrap; }
    .color-swatch { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s,border-color .1s; }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:var(--text-1); }
    .option-color-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
    .option-color-row:last-child { border-bottom:none; }
    .option-color-label { flex:1; font-size:13px; color:var(--text-1); }
    .mini-swatch { width:18px; height:18px; border-radius:4px; cursor:pointer; border:1px solid var(--border); flex-shrink:0; }
    .option-del-btn { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:13px; padding:2px 4px; border-radius:3px; }
    .option-del-btn:hover { color:var(--red); background:var(--red-bg); }

    .toast { position:fixed; bottom:90px; right:24px; z-index:200; background:var(--text-1); color:#fff; padding:10px 16px; border-radius:var(--radius-md); font-size:13px; font-weight:500; box-shadow:var(--shadow-md); animation:toastIn .2s ease-out; }
    @keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>

<script>
const SUPABASE_URL  = 'https://ocdrqmaalkuxplbpfnio.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Jnp-8tDyi3S_zXxf8ROUOg_-ot7rkdN';
const STORAGE_KEY   = 'signal_v4';

let sb = null;
let projects = [{id:'proj-1',name:'General'}];
let currentProjectId = 'proj-1';
let columns = [
  {id:'task',    label:'Task',     type:'text',   required:true,  width:'280px'},
  {id:'status',  label:'Status',   type:'list',   required:true,  options:[{v:'todo',bg:'#F0F1F5',tc:'#5A5F72'},{v:'progress',bg:'#EFF6FF',tc:'#1E40AF'},{v:'waiting',bg:'#FFFBEB',tc:'#92400E'},{v:'done',bg:'#ECFDF5',tc:'#065F46'}], width:'140px'},
  {id:'priority',label:'Priority', type:'list',   required:true,  options:[{v:'low',bg:'#ECFDF5',tc:'#065F46'},{v:'medium',bg:'#FFFBEB',tc:'#92400E'},{v:'high',bg:'#FEF2F2',tc:'#991B1B'}], width:'130px'},
  {id:'assignee',label:'Assignee', type:'multi',  required:false, width:'200px'},
  {id:'dueDate', label:'Due date', type:'date',   required:false, width:'150px'},
];
let tasksByProject = {'proj-1':[]};
let filters = {};
let expandedTasks = {};
let menuOpenFor = null;
let sortCol = null, sortDir = 'asc';
let dragSrcId = null, boardDragSrcId = null;
let cloud = {enabled:false,url:SUPABASE_URL,anonKey:SUPABASE_ANON};
let currentView = 'table';
let sidebarOpen = true;
let myLiveTask = null;
let userProfile = {name:'Haroon',email:'your@email.com',photo:null};
let teamMembers = [
  {id:'tm-2',name:'Sarah K.',initials:'SK',status:'active',liveTask:'Working on API integration'},
  {id:'tm-3',name:'Mike R.',initials:'MR',status:'idle',liveTask:null},
  {id:'tm-4',name:'Emily Z.',initials:'EZ',status:'active',liveTask:'User research sessions'},
  {id:'tm-5',name:'John D.',initials:'JD',status:'offline',liveTask:null},
];
const PALETTE = ['#EF4444','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16','#06B6D4','#A78BFA','#78716C','#0F1117'];

const esc = s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML;};
const getTasks = ()=>(tasksByProject[currentProjectId]||=[]);
const save = ()=>localStorage.setItem(STORAGE_KEY,JSON.stringify({projects,currentProjectId,columns,tasksByProject,filters,cloud,userProfile}));
const todayStr = ()=>new Date().toISOString().split('T')[0];
const isOverdue = (d,s)=>d&&s!=='done'&&d<todayStr();
const statusLabel = s=>({todo:'To do',progress:'In progress',waiting:'Waiting',done:'Done'}[s]||s);
const fmtDate = d=>{if(!d)return'';const diff=Math.round((new Date(d)-new Date())/86400000);if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});};

function toast(msg,ok=true){
  const el=document.createElement('div');el.className='toast';
  el.textContent=(ok?'✓ ':'⚠ ')+msg;document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2200);
}
function normalizeTask(t={}){
  const r={id:t.id||Date.now(),subtasks:t.subtasks||[],assignees:t.assignees||[]};
  columns.forEach(c=>{
    if(c.type==='multi') return;
    const def=c.type==='list'?(c.options?.[0]?.v||''):'';
    r[c.id]=t[c.id]??def;
  });
  return r;
}

// ── Profile ────────────────────────────────────────────────
function updateProfileUI(){
  const initials=(userProfile.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sidebar-initials').textContent=initials;
  document.getElementById('sidebar-name').textContent=userProfile.name||'User';
  document.getElementById('sidebar-email').textContent=userProfile.email||'';
  document.getElementById('live-my-initials').textContent=initials;
  document.getElementById('live-my-name').textContent=userProfile.name||'You';
  const avEl=document.getElementById('sidebar-av');
  const liveAvEl=document.getElementById('live-my-av');
  if(userProfile.photo){
    avEl.innerHTML=`<img src="${userProfile.photo}" alt="">`;
    liveAvEl.innerHTML=`<img src="${userProfile.photo}" alt="">`;
  } else {
    avEl.innerHTML=`<span id="sidebar-initials">${initials}</span>`;
    liveAvEl.innerHTML=`<span id="live-my-initials">${initials}</span>`;
  }
}
function openProfileModal(){
  openModal({title:'Profile & settings',cls:'wide',
    body:`
      <div class="avatar-upload">
        <div class="avatar-preview" id="av-prev">${userProfile.photo?`<img src="${userProfile.photo}">`:(userProfile.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>
        <div>
          <button class="avatar-upload-btn" onclick="document.getElementById('av-file').click()">Upload photo</button>
          <input type="file" id="av-file" accept="image/*" style="display:none" onchange="previewAvatar(this)">
          <div style="font-size:11px;color:var(--text-3);margin-top:4px">JPG, PNG or GIF · max 2MB</div>
        </div>
      </div>
      <div><label class="field-label">Display name</label><input id="prof-name" class="field-input" value="${esc(userProfile.name)}"></div>
      <div><label class="field-label">Email</label><input id="prof-email" class="field-input" type="email" value="${esc(userProfile.email)}"></div>
      <div style="border-top:1px solid var(--border);padding-top:14px">
        <div style="font-size:13px;font-weight:500;margin-bottom:10px;color:var(--text-1)">Password reset</div>
        <div><label class="field-label">New password</label><input id="prof-pw1" class="field-input" type="password" placeholder="Enter new password"></div>
        <div style="margin-top:10px"><label class="field-label">Confirm password</label><input id="prof-pw2" class="field-input" type="password" placeholder="Confirm new password"></div>
        <div class="field-hint" style="margin-top:6px">Leave blank to keep current password</div>
      </div>`,
    saveLabel:'Save changes',
    onSave:()=>{
      const n=document.getElementById('prof-name').value.trim();
      const e=document.getElementById('prof-email').value.trim();
      const p1=document.getElementById('prof-pw1').value;
      const p2=document.getElementById('prof-pw2').value;
      if(p1&&p1!==p2){toast('Passwords do not match',false);return;}
      if(n)userProfile.name=n;
      if(e)userProfile.email=e;
      const prev=document.getElementById('av-prev').querySelector('img');
      if(prev)userProfile.photo=prev.src;

// ── Cloud ──────────────────────────────────────────────────
function setCloudStatus(s){
  const dot=document.getElementById('cloud-dot'),txt=document.getElementById('cloud-text');
  dot.className='cloud-dot';
  if(s==='connected'){dot.classList.add('green');txt.textContent='Cloud connected';}
  else if(s==='syncing'){dot.classList.add('blue');txt.textContent='Syncing…';}
  else if(s==='error'){dot.classList.add('red');txt.textContent='Cloud error';}
  else txt.textContent='Not connected';
}
function initSupabase(){
  if(!cloud.url||!cloud.anonKey||cloud.url.includes('PASTE'))return;
  try{sb=window.supabase.createClient(cloud.url,cloud.anonKey);cloud.enabled=true;setCloudStatus('connected');syncFromCloud();}
  catch(e){setCloudStatus('error');}
}
async function syncFromCloud(){
  if(!sb)return;setCloudStatus('syncing');
  try{
    const{data:pData}=await sb.from('projects').select('*').order('created_at');
    if(pData?.length){projects=pData.map(p=>({id:p.id,name:p.name}));pData.forEach(p=>{if(!tasksByProject[p.id])tasksByProject[p.id]=[];});}
    const{data:tData}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
    if(tData){
      Object.keys(tasksByProject).forEach(pid=>tasksByProject[pid]=[]);
      tData.forEach(row=>{
        const pid=row.project_id||'proj-1';
        if(!tasksByProject[pid])tasksByProject[pid]=[];
        tasksByProject[pid].push(normalizeTask({id:row.id,task:row.task,status:row.status,priority:row.priority,assignees:row.assignees||[],dueDate:row.due_date,subtasks:row.subtasks||[]}));
      });
    }
    setCloudStatus('connected');save();renderAll();
  }catch(e){setCloudStatus('error');toast('Sync failed',false);}
}
async function cloudUpsertTask(t){
  if(!sb)return;
  await sb.from('tasks').upsert({id:t.id,project_id:currentProjectId,task:t.task,status:t.status,priority:t.priority,assignees:t.assignees||[],due_date:t.dueDate||'',subtasks:t.subtasks||[]});
}
async function cloudDeleteTask(id){if(sb)await sb.from('tasks').delete().eq('id',id);}
async function cloudUpsertProject(p){if(sb)await sb.from('projects').upsert({id:p.id,name:p.name});}
async function cloudDeleteProject(id){if(sb)await sb.from('projects').delete().eq('id',id);}

// ── Sorting ────────────────────────────────────────────────
function toggleSort(id){sortCol===id?(sortDir=sortDir==='asc'?'desc':'asc'):(sortCol=id,sortDir='asc');renderTable();}
function getSorted(tasks){
  if(!sortCol)return tasks;
  const pOrd={high:0,medium:1,low:2};
  return[...tasks].sort((a,b)=>{
    let av=String(a[sortCol]||'').toLowerCase(),bv=String(b[sortCol]||'').toLowerCase();
    if(sortCol==='dueDate'){av=av||'9999';bv=bv||'9999';}
    if(sortCol==='priority'){av=pOrd[av]??9;bv=pOrd[bv]??9;}
    return av<bv?(sortDir==='asc'?-1:1):av>bv?(sortDir==='asc'?1:-1):0;
  });
}

// ── Table ──────────────────────────────────────────────────
function applyFilters(tasks){return tasks.filter(t=>Object.entries(filters).every(([k,v])=>!v?.length||v.includes(String(t[k]||''))));}

function getListStyle(col,val){
  if(!col||col.type!=='list')return{bg:'var(--surface-3)',tc:'var(--text-2)'};
  const opt=(col.options||[]).find(o=>o.v===val);
  return opt?{bg:opt.bg,tc:opt.tc}:{bg:'var(--surface-3)',tc:'var(--text-2)'};
}

function renderListBadge(tid,colId,val,col){
  const{bg,tc}=getListStyle(col,val);
  const opts=(col.options||[]).map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${o.v}</option>`).join('');
  const extra=colId==='status'?`;if(this.value==='done')confetti(this)`:'';
  return `<span class="badge" style="background:${bg};color:${tc}">
    <span class="badge-dot" style="background:${tc}"></span>
    <select style="color:${tc}" onchange="updateCell(${tid},'${colId}',this.value)${extra}">${opts}</select>
  </span>`;
}

function renderMultiAssignee(t){
  const assignees=t.assignees||[];
  const chips=assignees.map(a=>`
    <span class="chip">
      <span class="chip-av">${(a||'?')[0].toUpperCase()}</span>
      ${esc(a)}
      <button class="chip-del" onclick="removeAssignee(${t.id},'${esc(a)}')">×</button>
    </span>`).join('');
  return `<div class="assignee-chips" style="position:relative">
    ${chips}
    <button class="chip-add" onclick="openAssigneeDropdown(${t.id},this)">+ Add</button>
  </div>`;
}

function openAssigneeDropdown(tid,btn){
  document.querySelectorAll('.assignee-dropdown').forEach(d=>d.remove());
  const t=getTasks().find(x=>x.id===tid);
  const assigned=t.assignees||[];
  const suggested=[userProfile.name,...teamMembers.map(m=>m.name)].filter(Boolean);
  const wrap=btn.parentElement;
  wrap.style.position='relative';
  const dd=document.createElement('div');
  dd.className='assignee-dropdown';
  dd.innerHTML=`<input class="assignee-custom-input" placeholder="Type a name…" oninput="filterAssigneeOpts(this,${tid})" onkeydown="if(event.key==='Enter'){addAssigneeCustom(${tid},this.value);this.value=''}">
    <div id="assign-opts-${tid}">
      ${suggested.map(n=>`<div class="assignee-opt" onclick="toggleAssignee(${tid},'${esc(n)}')">
        <div class="assignee-opt-av">${n[0].toUpperCase()}</div>
        <span>${esc(n)}</span>
        ${assigned.includes(n)?'<span class="assignee-opt-check">✓</span>':''}
      </div>`).join('')}
    </div>`;
  wrap.appendChild(dd);
  setTimeout(()=>document.addEventListener('click',function h(e){if(!wrap.contains(e.target)){dd.remove();document.removeEventListener('click',h);}},true),10);

function filterAssigneeOpts(inp,tid){
  const v=inp.value.toLowerCase();
  const t=getTasks().find(x=>x.id===tid);
  const assigned=t.assignees||[];
  const suggested=[userProfile.name,...teamMembers.map(m=>m.name)].filter(n=>n.toLowerCase().includes(v));
  document.getElementById('assign-opts-'+tid).innerHTML=suggested.map(n=>`
    <div class="assignee-opt" onclick="toggleAssignee(${tid},'${esc(n)}')">
      <div class="assignee-opt-av">${n[0].toUpperCase()}</div>
      <span>${esc(n)}</span>
      ${assigned.includes(n)?'<span class="assignee-opt-check">✓</span>':''}
    </div>`).join('');
}
async function toggleAssignee(tid,name){
  const t=getTasks().find(x=>x.id===tid);
  t.assignees=t.assignees||[];
  t.assignees=t.assignees.includes(name)?t.assignees.filter(x=>x!==name):[...t.assignees,name];
  document.querySelectorAll('.assignee-dropdown').forEach(d=>d.remove());
  renderTable();save();await cloudUpsertTask(t);
}
async function removeAssignee(tid,name){
  const t=getTasks().find(x=>x.id===tid);
  t.assignees=(t.assignees||[]).filter(x=>x!==name);
  renderTable();save();await cloudUpsertTask(t);
}
async function addAssigneeCustom(tid,name){
  name=name.trim();if(!name)return;
  const t=getTasks().find(x=>x.id===tid);
  t.assignees=t.assignees||[];
  if(!t.assignees.includes(name))t.assignees.push(name);
  renderTable();save();await cloudUpsertTask(t);
}

function renderCell(t,c){
  const v=t[c.id]??'';
  if(c.id==='task') return `<div style="display:flex;align-items:center;gap:4px;padding:8px 12px"><button class="expand-btn" onclick="toggleExpand(${t.id})">${expandedTasks[t.id]?'▾':'▸'}</button><input class="cell-in cell-task" value="${esc(v)}" onchange="updateCell(${t.id},'task',this.value)"></div>`;
  if(c.type==='list') return `<div style="padding:8px 12px">${renderListBadge(t.id,c.id,v,c)}</div>`;
  if(c.type==='multi') return renderMultiAssignee(t);
  if(c.type==='date') return `<div style="padding:8px 12px"><input type="date" class="cell-in ${isOverdue(v,t.status)?'overdue-date':''}" value="${esc(v)}" onchange="updateCell(${t.id},'${c.id}',this.value)"></div>`;
  return `<div style="padding:8px 12px"><input class="cell-in" value="${esc(v)}" onchange="updateCell(${t.id},'${c.id}',this.value)"></div>`;
}
function renderSubtasks(t){
  const n=columns.length+3;
  return `<tr><td colspan="${n}" class="subtask-td">
    ${(t.subtasks||[]).map(s=>`<div class="subtask-row"><input type="checkbox" class="subtask-cb" ${s.done?'checked':''} onchange="toggleSubtask(${t.id},${s.id})"><input class="subtask-in" style="${s.done?'opacity:.5;text-decoration:line-through':''}" value="${esc(s.title)}" onchange="editSubtask(${t.id},${s.id},this.value)"><button class="subtask-del" onclick="deleteSubtask(${t.id},${s.id})">✕</button></div>`).join('')}
    <button class="subtask-add" onclick="addSubtask(${t.id})">+ Add subtask</button>
  </td></tr>`;
}
function renderRow(t,i,arr){
  const od=isOverdue(t.dueDate,t.status);
  const cells=columns.map(c=>`<td>${renderCell(t,c)}</td>`).join('');
  const menu=menuOpenFor===t.id?`<div class="action-menu">
    <button class="action-item" onclick="moveRow(${t.id},-1)" ${i===0?'disabled':''}>↑ Move up</button>
    <button class="action-item" onclick="moveRow(${t.id},1)" ${i===arr.length-1?'disabled':''}>↓ Move down</button>
    <div class="menu-sep"></div>
    <button class="action-item" onclick="duplicateTask(${t.id})">Duplicate</button>
    <button class="action-item" onclick="addSubtask(${t.id})">Add subtask</button>
    <div class="menu-sep"></div>
    <button class="action-item danger" onclick="deleteTask(${t.id})">Delete</button>
  </div>`:'';
  return `<tr class="${od?'overdue-row':''}" draggable="true" ondragstart="dragStart(event,${t.id})" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event,${t.id})">
    <td class="row-num"><span style="font-size:12px;color:var(--border-strong)">⠿</span><br><span style="font-size:10px">${i+1}</span></td>
    ${cells}
    <td style="padding:8px 10px;width:40px"><div class="action-menu-wrap"><button class="action-btn" onclick="toggleMenu(${t.id},event)">···</button>${menu}</div></td>
  </tr>${expandedTasks[t.id]?renderSubtasks(t):''}`;
}
let colDragSrc = null;

function renderTable(){
  let tasks=getSorted(applyFilters(getTasks()));
  const ths=columns.map(c=>{
    const isS=sortCol===c.id;const hf=Boolean(filters[c.id]?.length);
    return `<th draggable="true" data-colid="${c.id}" style="min-width:${c.width};cursor:grab"
      ondragstart="colDragStart(event,'${c.id}')"
      ondragover="colDragOver(event,'${c.id}')"
      ondragleave="colDragLeave(event)"
      ondrop="colDrop(event,'${c.id}')"
      ondragend="colDragEnd(event)">
      <div class="th-inner">
        <span style="font-size:11px;color:var(--border-strong);margin-right:2px;cursor:grab">⠿</span>
        <span class="th-sort" onclick="toggleSort('${c.id}')">${esc(c.label)}</span>
        <span class="sort-icon ${isS?'active':''}" onclick="toggleSort('${c.id}')">${isS?(sortDir==='asc'?'↑':'↓'):'↕'}</span>
        <span class="th-edit" onclick="openColEditor('${c.id}')">✎</span>
        <span class="th-filter ${hf?'active':''}" onclick="toggleFilterMenu('${c.id}',event)">▾</span>
      </div>
    </th>`;
  }).join('');
  const rows=tasks.length?tasks.map((t,i,a)=>renderRow(t,i,a)).join(''):`<tr><td colspan="${columns.length+3}" style="padding:48px;text-align:center;color:var(--text-3)">No tasks yet — click New task or type a command below.</td></tr>`;
  document.getElementById('table-wrap').innerHTML=`<table><thead><tr><th style="width:36px"></th>${ths}<th><button class="add-col-btn" onclick="openColCreator()">+</button></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function colDragStart(e,id){
  colDragSrc=id;
  setTimeout(()=>e.currentTarget.classList.add('col-dragging'),0);
  e.dataTransfer.effectAllowed='move';
}
function colDragOver(e,id){
  e.preventDefault();
  if(colDragSrc&&colDragSrc!==id){
    document.querySelectorAll('th.col-drag-over').forEach(el=>el.classList.remove('col-drag-over'));
    e.currentTarget.classList.add('col-drag-over');
  }
}
function colDragLeave(e){ e.currentTarget.classList.remove('col-drag-over'); }
function colDragEnd(e){
  e.currentTarget.classList.remove('col-dragging');
  document.querySelectorAll('th.col-drag-over').forEach(el=>el.classList.remove('col-drag-over'));
}
function colDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('col-drag-over');
  if(!colDragSrc||colDragSrc===targetId)return;
  const si=columns.findIndex(c=>c.id===colDragSrc);
  const ti=columns.findIndex(c=>c.id===targetId);
  if(si<0||ti<0)return;
  const[moved]=columns.splice(si,1);
  columns.splice(ti,0,moved);
  colDragSrc=null;
  renderTable();save();
}

// ── Board ──────────────────────────────────────────────────
const boardCols=[{id:'todo',label:'To do',color:'#9499AD'},{id:'progress',label:'In progress',color:'#3B82F6'},{id:'waiting',label:'Waiting',color:'#F59E0B'},{id:'done',label:'Done',color:'#10B981'}];
function renderBoard(){
  const tasks=getTasks();
  document.getElementById('board-view').innerHTML=boardCols.map(col=>{
    const ct=tasks.filter(t=>t.status===col.id);
    const cards=ct.map(t=>{
      const od=isOverdue(t.dueDate,t.status);
      const avs=(t.assignees||[]).slice(0,4).map(a=>`<div class="board-av">${(a||'?')[0].toUpperCase()}</div>`).join('');
      const{bg,tc}=getListStyle(columns.find(c=>c.id==='priority'),t.priority);
      return `<div class="board-card" draggable="true" ondragstart="boardDragStart(event,${t.id})" ondragend="boardDragEnd(event)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span class="badge" style="background:${bg};color:${tc};font-size:10px;padding:2px 7px"><span class="badge-dot" style="background:${tc}"></span>${t.priority}</span>
        </div>
        <div class="board-card-title">${esc(t.task)}</div>
        <div class="board-card-foot">
          <div class="board-card-assignees">${avs||'<span style="font-size:11px;color:var(--text-3)">Unassigned</span>'}</div>
          <span class="board-card-due ${od?'overdue':''}">${fmtDate(t.dueDate)}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="board-col">
      <div class="board-col-head">
        <div class="board-col-title"><span style="width:8px;height:8px;border-radius:50%;background:${col.color};display:inline-block"></span>${col.label}</div>
        <span class="board-col-count">${ct.length}</span>
      </div>
      <div class="board-col-body" data-status="${col.id}" ondragover="boardDragOver(event)" ondragleave="boardDragLeave(event)" ondrop="boardDrop(event,'${col.id}')">
        ${cards}
        <button class="board-add-btn" onclick="addTaskWithStatus('${col.id}')">+ Add task</button>
      </div>
    </div>`;
  }).join('');
}
function boardDragStart(e,id){boardDragSrcId=id;setTimeout(()=>e.target.classList.add('dragging'),0);}
function boardDragEnd(e){e.target.classList.remove('dragging');}
function boardDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function boardDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function boardDrop(e,status){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const t=getTasks().find(x=>x.id===boardDragSrcId);
  if(t&&t.status!==status){t.status=status;save();cloudUpsertTask(t);renderBoard();updateStats();toast('Moved to '+statusLabel(status));}
  boardDragSrcId=null;
}
async function addTaskWithStatus(status){
  const t=normalizeTask({status});getTasks().unshift(t);renderBoard();updateStats();save();await cloudUpsertTask(t);
}

// ── Table Drag ─────────────────────────────────────────────
function dragStart(e,id){dragSrcId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,targetId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragSrcId===targetId)return;
  const arr=getTasks();const si=arr.findIndex(t=>t.id===dragSrcId),ti=arr.findIndex(t=>t.id===targetId);
  if(si<0||ti<0)return;const[m]=arr.splice(si,1);arr.splice(ti,0,m);
  dragSrcId=null;renderTable();save();arr.forEach(t=>cloudUpsertTask(t));
}
function moveRow(id,dir){menuOpenFor=null;const arr=getTasks();const i=arr.findIndex(t=>t.id===id);const ni=i+dir;if(ni<0||ni>=arr.length)return;[arr[i],arr[ni]]=[arr[ni],arr[i]];renderTable();save();}

// ── CRUD ───────────────────────────────────────────────────
async function addTaskRow(title=''){
  const t=normalizeTask({task:title||'New task'});getTasks().unshift(t);
  switchView('table');renderTable();updateStats();save();await cloudUpsertTask(t);if(title)toast('Task added');
}
async function updateCell(id,key,val){
  const t=getTasks().find(x=>x.id===id);if(!t)return;
  t[key]=val;updateStats();save();await cloudUpsertTask(t);
  if(currentView==='board')renderBoard();
}
async function deleteTask(id){
  menuOpenFor=null;const t=getTasks().find(x=>x.id===id);
  confirmDelete(`Delete "${t?.task||'this task'}"? Cannot be undone.`,async()=>{
    tasksByProject[currentProjectId]=getTasks().filter(x=>x.id!==id);
    renderTable();updateStats();save();await cloudDeleteTask(id);toast('Task deleted');
    if(currentView==='board')renderBoard();
  });
}
function duplicateTask(id){
  const t=getTasks().find(x=>x.id===id);const c=normalizeTask({...t,id:Date.now()});
  getTasks().unshift(c);menuOpenFor=null;renderTable();updateStats();save();cloudUpsertTask(c);toast('Duplicated');
}
async function addSubtask(tid){
  const t=getTasks().find(x=>x.id===tid);t.subtasks=t.subtasks||[];
  t.subtasks.push({id:Date.now(),title:'New subtask',done:false});
  expandedTasks[tid]=true;menuOpenFor=null;renderTable();save();await cloudUpsertTask(t);
}
async function toggleSubtask(tid,sid){const t=getTasks().find(x=>x.id===tid);const s=t.subtasks.find(x=>x.id===sid);if(s){s.done=!s.done;renderTable();save();await cloudUpsertTask(t);}}
async function editSubtask(tid,sid,val){const t=getTasks().find(x=>x.id===tid);const s=t.subtasks.find(x=>x.id===sid);if(s){s.title=val;save();await cloudUpsertTask(t);}}
async function deleteSubtask(tid,sid){const t=getTasks().find(x=>x.id===tid);t.subtasks=t.subtasks.filter(x=>x.id!==sid);renderTable();save();await cloudUpsertTask(t);}
function toggleExpand(id){expandedTasks[id]=!expandedTasks[id];renderTable();}
function toggleMenu(id,e){e.stopPropagation();menuOpenFor=menuOpenFor===id?null:id;renderTable();}

// ── Column editor ──────────────────────────────────────────
function openColCreator(){
  const id='col_'+Date.now();
  columns.push({id,label:'New column',type:'text',required:false,width:'170px'});
  Object.keys(tasksByProject).forEach(pid=>tasksByProject[pid]=tasksByProject[pid].map(normalizeTask));
  renderTable();save();openColEditor(id);
}

function buildOptionColorRows(c){
  return(c.options||[]).map((o,i)=>`
    <div class="option-color-row" id="opt-row-${i}">
      <input class="cell-in" style="flex:1;border:1px solid var(--border);padding:4px 8px" value="${esc(o.v)}" id="opt-v-${i}" onchange="previewOptColor(${i})">
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:11px;color:var(--text-3)">bg</span>
        <input type="color" class="mini-swatch" value="${o.bg}" id="opt-bg-${i}" style="width:28px;height:24px;padding:1px;border-radius:4px" onchange="previewOptColor(${i})">
        <span style="font-size:11px;color:var(--text-3)">text</span>
        <input type="color" class="mini-swatch" value="${o.tc}" id="opt-tc-${i}" style="width:28px;height:24px;padding:1px;border-radius:4px" onchange="previewOptColor(${i})">
        <span id="opt-prev-${i}" class="badge" style="background:${o.bg};color:${o.tc};min-width:50px;justify-content:center">${esc(o.v)}</span>
      </div>
      <button class="option-del-btn" onclick="removeOptRow(${i})">✕</button>
    </div>`).join('');
}
function previewOptColor(i){
  const v=document.getElementById('opt-v-'+i)?.value||'';
  const bg=document.getElementById('opt-bg-'+i)?.value||'#f0f0f0';
  const tc=document.getElementById('opt-tc-'+i)?.value||'#333';
  const prev=document.getElementById('opt-prev-'+i);
  if(prev){prev.style.background=bg;prev.style.color=tc;prev.textContent=v;}
}
function removeOptRow(i){document.getElementById('opt-row-'+i)?.remove();}
function addOptRow(){
  const container=document.getElementById('opt-rows');
  const i=Date.now();
  const div=document.createElement('div');div.className='option-color-row';div.id='opt-row-'+i;
  div.innerHTML=`<input class="cell-in" style="flex:1;border:1px solid var(--border);padding:4px 8px" value="Option" id="opt-v-${i}" onchange="previewOptColor(${i})">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:11px;color:var(--text-3)">bg</span>
      <input type="color" class="mini-swatch" value="#EEF0FF" id="opt-bg-${i}" style="width:28px;height:24px;padding:1px;border-radius:4px" onchange="previewOptColor(${i})">
      <span style="font-size:11px;color:var(--text-3)">text</span>
      <input type="color" class="mini-swatch" value="#4338CA" id="opt-tc-${i}" style="width:28px;height:24px;padding:1px;border-radius:4px" onchange="previewOptColor(${i})">
      <span id="opt-prev-${i}" class="badge" style="background:#EEF0FF;color:#4338CA;min-width:50px;justify-content:center">Option</span>
    </div>
    <button class="option-del-btn" onclick="removeOptRow(${i})">✕</button>`;
  container.appendChild(div);
}

function openColEditor(id){
  const c=columns.find(x=>x.id===id);if(!c)return;
  const typeOptions=['text','number','date','list','multi'].map(t=>`<option ${(c.type||'text')===t?'selected':''} value="${t}">${t==='list'?'List (dropdown)':t==='multi'?'Multi-assignee':t}</option>`).join('');
  const isListType=c.type==='list';
  openModal({title:'Edit column',cls:'wide',showDelete:!c.required,
    body:`
      <div><label class="field-label">Column name</label><input id="col-n" class="field-input" value="${esc(c.label)}"></div>
      <div><label class="field-label">Type</label><select id="col-t" class="field-input" onchange="toggleOptSection(this.value)">${typeOptions}</select></div>
      <div id="opt-section" style="${isListType?'':'display:none'}">
        <label class="field-label">Options & colours</label>
        <div id="opt-rows">${buildOptionColorRows(c)}</div>
        <button type="button" class="subtask-add" style="margin-top:8px" onclick="addOptRow()">+ Add option</button>
      </div>`,
    onSave:()=>{
      c.label=document.getElementById('col-n').value.trim()||c.label;
      c.type=document.getElementById('col-t').value;
      if(c.type==='list'){
        const rows=document.querySelectorAll('#opt-rows .option-color-row');
        c.options=[...rows].map(row=>{
          const idx=row.id.replace('opt-row-','');
          return{v:document.getElementById('opt-v-'+idx)?.value||'',bg:document.getElementById('opt-bg-'+idx)?.value||'#f0f0f0',tc:document.getElementById('opt-tc-'+idx)?.value||'#333'};
        }).filter(o=>o.v.trim());
      } else { c.options=[]; }
      renderTable();save();closeModal();
    },
    onDelete:()=>{columns=columns.filter(x=>x.id!==id);Object.keys(tasksByProject).forEach(pid=>tasksByProject[pid].forEach(t=>delete t[id]));renderTable();save();closeModal();}
  });
}
function toggleOptSection(val){
  const s=document.getElementById('opt-section');
  if(s)s.style.display=val==='list'?'':'none';
}

// ── Filters ────────────────────────────────────────────────
function toggleFilterMenu(id,e){
  e.stopPropagation();const ex=document.getElementById('fm-'+id);if(ex){ex.remove();return;}
  document.querySelectorAll('[id^="fm-"]').forEach(m=>m.remove());
  const vals=[...new Set(getTasks().map(t=>String(t[id]||'')))];const active=filters[id]||[];
  const m=document.createElement('div');m.id='fm-'+id;m.className='filter-menu';
  m.innerHTML=vals.map(v=>`<label class="filter-lbl"><input type="checkbox" ${active.includes(v)?'checked':''} onchange="toggleFV('${id}','${String(v).replace(/'/g,"\\'")}')"><span>${esc(v||'(empty)')}</span></label>`).join('')
    +`<button class="filter-clear" onclick="clearFilter('${id}')">Clear</button>`;
  const th=e.currentTarget.closest('th');th.style.position='relative';th.appendChild(m);
}
function toggleFV(id,v){filters[id]=filters[id]||[];filters[id]=filters[id].includes(v)?filters[id].filter(x=>x!==v):[...filters[id],v];renderTable();save();}
function clearFilter(id){delete filters[id];renderTable();save();}

// ── Modals ─────────────────────────────────────────────────
function openModal({title,body,onSave,onDelete,showDelete=false,saveLabel='Save',cls=''}){
  window._ms=onSave;window._md=onDelete;
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${cls}">
        <div class="modal-head"><span class="modal-title">${esc(title)}</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">${body}</div>
        <div class="modal-foot">
          <div>${showDelete?`<button class="btn btn-danger btn-sm" onclick="_md&&_md()">Delete</button>`:''}</div>
          <div class="modal-foot-right">
            <button class="btn btn-cancel btn-sm" onclick="closeModal()">Cancel</button>
            ${saveLabel?`<button class="btn btn-primary btn-sm" onclick="_ms&&_ms()">${esc(saveLabel)}</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function confirmDelete(msg,cb){openModal({title:'Confirm delete',body:`<p style="color:var(--text-2);font-size:13px;line-height:1.6">${esc(msg)}</p>`,saveLabel:'Delete',onSave:()=>{closeModal();cb();}});}
function openProjectModal(){
  openModal({title:'New project',saveLabel:'Create',
    body:`<div><label class="field-label">Project name</label><input id="pn" class="field-input" placeholder="e.g. Q3 Marketing"></div>`,
    onSave:async()=>{const name=document.getElementById('pn').value.trim();if(!name)return;const p={id:'proj-'+Date.now(),name};projects.push(p);tasksByProject[p.id]=[];await cloudUpsertProject(p);currentProjectId=p.id;renderAll();save();closeModal();}
  });
}

// ── Confetti ───────────────────────────────────────────────
function confetti(el){
  const r=el.getBoundingClientRect();
  ['#5B4FE8','#10B981','#F59E0B','#EF4444','#3B82F6'].forEach(c=>{
    const p=document.createElement('span');
    p.style.cssText=`position:fixed;pointer-events:none;width:6px;height:6px;border-radius:50%;background:${c};left:${r.left+Math.random()*40}px;top:${r.top}px;z-index:999;transition:all .8s cubic-bezier(.25,.46,.45,.94)`;
    document.body.appendChild(p);
    setTimeout(()=>{p.style.transform=`translate(${(Math.random()-.5)*100}px,${-50-Math.random()*60}px)`;p.style.opacity='0';},20);
    setTimeout(()=>p.remove(),900);
  });
}

// ── Command bar ────────────────────────────────────────────
function quickCmd(prefix){const i=document.getElementById('cmd-input');i.value=prefix;i.focus();}
function extractBullets(msg){const lines=msg.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);const b=lines.filter(l=>/^[-*•]\s+/.test(l)).map(l=>l.replace(/^[-*•]\s+/,'').trim());return b.length?b:[];}
function cleanTitle(msg){return msg.trim().replace(/^(please\s+)?(create|add|new)\s+(a\s+)?task[:\s-]*/i,'').replace(/\s+(by|due)\s+\S+$/i,'').trim();}
function findTask(msg){const keys=msg.toLowerCase().split(/\s+/).filter(w=>w.length>3&&!['task','done','mark','create','delete','add','new'].includes(w));return getTasks().find(t=>keys.some(k=>String(t.task||'').toLowerCase().includes(k)))||getTasks()[0];}
function runPrompt(){
  const inp=document.getElementById('cmd-input');const text=inp.value.trim();if(!text)return;inp.value='';
  const bullets=extractBullets(text);
  if(bullets.length){bullets.forEach(t=>addTaskRow(t));toast(bullets.length+' tasks added');return;}
  const lo=text.toLowerCase();
  if(/create|add|new/i.test(lo)&&!/done|complete/i.test(lo)) addTaskRow(cleanTitle(text));
  else if(/done|complete/i.test(lo)){const t=findTask(text);if(t){updateCell(t.id,'status','done');toast('Done! 🎉');}}
  else if(/delete|remove/i.test(lo)){const t=findTask(text);if(t)deleteTask(t.id);}
  else if(/high priority|urgent/i.test(lo)){const t=findTask(text);if(t){updateCell(t.id,'priority','high');toast('Priority set to high');}}
  else addTaskRow(text);
}

// ── Boot ───────────────────────────────────────────────────
function loadState(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const s=JSON.parse(raw);
    projects=s.projects||projects;currentProjectId=s.currentProjectId||currentProjectId;
    columns=s.columns||columns;tasksByProject=s.tasksByProject||tasksByProject;
    filters=s.filters||{};if(s.cloud)cloud={...cloud,...s.cloud};
    if(s.userProfile)userProfile={...userProfile,...s.userProfile};
  }catch(_){}
}
document.addEventListener('DOMContentLoaded',()=>{
  loadState();updateProfileUI();renderAll();initSupabase();
  document.addEventListener('click',e=>{
    if(!e.target.closest('.action-menu-wrap')&&menuOpenFor!==null){menuOpenFor=null;renderTable();}
    if(!e.target.closest('.th-filter'))document.querySelectorAll('[id^="fm-"]').forEach(m=>m.remove());
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();menuOpenFor=null;renderTable();}});
});
</script>
