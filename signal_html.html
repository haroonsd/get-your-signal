<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal - Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .cell-input { width:100%; padding:4px 6px; border:1px solid transparent; border-radius:6px; background:transparent; outline:none; }
    .cell-input:focus { border-color:#6366f1; background:#eef2ff; }
    .header-edit-icon { opacity:0; transition:opacity .15s; }
    th:hover .header-edit-icon { opacity:1; }
    .modal-backdrop { background: rgba(15,23,42,0.45); backdrop-filter: blur(4px); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .2s ease-out; }
    .toast { position:fixed; bottom:100px; right:24px; background:#1e293b; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:9999; animation: fadeIn .2s ease-out; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-gray-50 text-gray-900">
<div class="h-full flex">
  <!-- Sidebar -->
  <aside class="w-64 border-r border-gray-200 bg-white p-4 flex flex-col gap-2">
    <div class="flex items-center gap-2 mb-2">
      <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i data-lucide="zap" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-bold text-lg text-indigo-600">Signal</span>
    </div>
    <div id="cloud-status" class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500 text-center">⚪ Not connected</div>
    <div class="text-xs text-gray-400 uppercase font-medium mt-3 px-1">Projects</div>
    <div id="project-list" class="flex flex-col gap-1"></div>
    <button onclick="openProjectModal()" class="mt-1 text-xs text-indigo-600 hover:text-indigo-800 px-2 py-1 text-left">+ New Project</button>
    <div class="mt-auto pt-4 border-t border-gray-100">
      <button onclick="openCloudModal()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <i data-lucide="cloud" class="w-4 h-4"></i> Cloud Settings
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-w-0 flex flex-col">
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
      <div>
        <h1 id="project-title" class="text-xl font-semibold">Tasks</h1>
        <p class="text-sm text-gray-500">Inline editing · cloud sync</p>
      </div>
      <div class="flex gap-2">
        <button onclick="addTaskRow()" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 flex items-center gap-1">
          <i data-lucide="plus" class="w-4 h-4"></i> New Task
        </button>
      </div>
    </header>

    <section class="p-6 pb-28 flex-1 min-h-0 overflow-auto">
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-5">
        <div class="bg-white border rounded-xl p-4">
          <div class="text-xs text-gray-500 mb-1">Total</div>
          <div id="stat-total" class="text-2xl font-bold">0</div>
        </div>
        <div class="bg-white border rounded-xl p-4">
          <div class="text-xs text-gray-500 mb-1">In Progress</div>
          <div id="stat-progress" class="text-2xl font-bold">0</div>
        </div>
        <div class="bg-white border rounded-xl p-4">
          <div class="text-xs text-gray-500 mb-1">Done</div>
          <div id="stat-done" class="text-2xl font-bold">0</div>
        </div>
      </div>
      <div id="table-wrap" class="bg-white border rounded-xl overflow-auto"></div>
    </section>
  </main>
</div>

<!-- Command bar -->
<div class="fixed left-0 right-0 bottom-0 px-6 pb-5 pointer-events-none">
  <div class="max-w-4xl mx-auto bg-white border rounded-2xl shadow-xl p-3 flex gap-2 pointer-events-auto">
    <input id="command-input" class="flex-1 px-3 py-2 text-sm border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-400"
      placeholder='Type a command… e.g. "add task Review deck by Friday"'
      onkeypress="if(event.key==='Enter')runPrompt()">
    <button onclick="runPrompt()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Run</button>
  </div>
</div>

<!-- Modals root -->
<div id="app-modal-root"></div>

<script>
// ── Config ──────────────────────────────────────────────
const SUPABASE_URL     = 'https://ocdrqmaalkuxplbpfnio.supabase.co';
const SUPABASE_ANON    = 'sb_publishable_Jnp-8tDyi3S_zXxf8ROUOg_-ot7rkdN';
const STORAGE_KEY      = 'signal_v1';

// ── State ────────────────────────────────────────────────
let sb = null;
let projects         = [{ id:'proj-1', name:'General' }];
let currentProjectId = 'proj-1';
let columns = [
  { id:'task',     label:'Task',     type:'text',   required:true,  width:'260px' },
  { id:'status',   label:'Status',   type:'select', required:true,  options:['todo','progress','waiting','done'], width:'150px' },
  { id:'priority', label:'Priority', type:'select', required:true,  options:['low','medium','high'], width:'140px' },
  { id:'assignee', label:'Assignee', type:'text',   required:false, width:'170px' },
  { id:'dueDate',  label:'Due Date', type:'date',   required:false, width:'170px' },
];
let tasksByProject  = { 'proj-1': [] };
let filters         = {};
let expandedTasks   = {};
let menuOpenFor     = null;
let cloud           = { enabled:false, url: SUPABASE_URL, anonKey: SUPABASE_ANON };

// ── Helpers ───────────────────────────────────────────────
const esc  = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
const getTasks = () => (tasksByProject[currentProjectId] ||= []);
const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, currentProjectId, columns, tasksByProject, filters, cloud }));

function toast(msg, ok=true) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = (ok ? '✅ ' : '⚠️ ') + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function normalizeTask(task={}) {
  const t = { id: task.id || Date.now(), subtasks: task.subtasks || [] };
  columns.forEach(c => t[c.id] = task[c.id] ?? (c.id==='status'?'todo': c.id==='priority'?'medium':''));
  return t;
}

// ── Supabase ──────────────────────────────────────────────
function initSupabase() {
  if (!cloud.url || !cloud.anonKey ||
      cloud.url === 'PASTE_YOUR_SUPABASE_URL_HERE' ||
      cloud.anonKey === 'PASTE_YOUR_ANON_KEY_HERE') return;
  try {
    sb = window.supabase.createClient(cloud.url, cloud.anonKey);
    cloud.enabled = true;
    setCloudStatus('connected');
    syncFromCloud();
  } catch(e) {
    setCloudStatus('error');
  }
}

function setCloudStatus(s) {
  const el = document.getElementById('cloud-status');
  if (s==='connected') { el.textContent='🟢 Cloud connected'; el.className='text-xs px-2 py-1 rounded-full bg-green-50 text-green-700 text-center'; }
  else if (s==='syncing') { el.textContent='🔄 Syncing…'; el.className='text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700 text-center'; }
  else if (s==='error')  { el.textContent='🔴 Cloud error'; el.className='text-xs px-2 py-1 rounded-full bg-red-50 text-red-700 text-center'; }
  else { el.textContent='⚪ Not connected'; el.className='text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500 text-center'; }
}

async function syncFromCloud() {
  if (!sb) return;
  setCloudStatus('syncing');
  try {
    const { data: pData } = await sb.from('projects').select('*').order('created_at');
    if (pData?.length) {
      projects = pData.map(p => ({ id: p.id, name: p.name }));
      pData.forEach(p => { if (!tasksByProject[p.id]) tasksByProject[p.id] = []; });
    }
    const { data: tData } = await sb.from('tasks').select('*').order('created_at', { ascending: false });
    if (tData) {
      Object.keys(tasksByProject).forEach(pid => tasksByProject[pid] = []);
      tData.forEach(row => {
        const pid = row.project_id || 'proj-1';
        if (!tasksByProject[pid]) tasksByProject[pid] = [];
        tasksByProject[pid].push(normalizeTask({
          id:       row.id,
          task:     row.task,
          status:   row.status,
          priority: row.priority,
          assignee: row.assignee,
          dueDate:  row.due_date,
          subtasks: row.subtasks || [],
        }));
      });
    }
    setCloudStatus('connected');
    save();
    renderProjectList();
    renderTable();
    updateStats();
  } catch(e) {
    setCloudStatus('error');
    toast('Sync failed: ' + e.message, false);
  }
}

async function cloudUpsertTask(task) {
  if (!sb) return;
  await sb.from('tasks').upsert({
    id:         task.id,
    project_id: currentProjectId,
    task:       task.task,
    status:     task.status,
    priority:   task.priority,
    assignee:   task.assignee || '',
    due_date:   task.dueDate  || '',
    subtasks:   task.subtasks || [],
  });
}

async function cloudDeleteTask(id) {
  if (!sb) return;
  await sb.from('tasks').delete().eq('id', id);
}

async function cloudUpsertProject(proj) {
  if (!sb) return;
  await sb.from('projects').upsert({ id: proj.id, name: proj.name });
}

// ── Projects ──────────────────────────────────────────────
function renderProjectList() {
  document.getElementById('project-list').innerHTML = projects.map(p => `
    <button onclick="switchProject('${p.id}')"
      class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${p.id===currentProjectId?'bg-indigo-50 text-indigo-700 font-medium':'text-gray-600 hover:bg-gray-50'}">
      ${esc(p.name)}
    </button>`).join('');
  document.getElementById('project-title').textContent =
    projects.find(p=>p.id===currentProjectId)?.name || 'Tasks';
}

function switchProject(id) {
  currentProjectId = id;
  renderProjectList();
  renderTable();
  updateStats();
  save();
}

// ── Modals ────────────────────────────────────────────────
function openModal({title, body, onSave, onDelete, showDelete=false, saveLabel='Save'}) {
  window._onSave = onSave; window._onDelete = onDelete;
  document.getElementById('app-modal-root').innerHTML = `
    <div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
      <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl border fade-in">
        <div class="px-6 py-4 border-b flex justify-between items-center">
          <h3 class="text-lg font-semibold">${esc(title)}</h3>
          <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-xl leading-none">×</button>
        </div>
        <div class="p-6 space-y-3">${body}</div>
        <div class="px-6 py-4 border-t flex justify-between">
          <div>${showDelete?'<button onclick="_onDelete&&_onDelete()" class="text-red-500 text-sm hover:text-red-700">Delete</button>':''}</div>
          <div class="flex gap-2">
            <button onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Cancel</button>
            <button onclick="_onSave&&_onSave()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">${esc(saveLabel)}</button>
          </div>
        </div>
      </div>
    </div>`;
}
function closeModal() { document.getElementById('app-modal-root').innerHTML = ''; }

function openProjectModal() {
  openModal({ title:'New Project', saveLabel:'Create',
    body:`<label class="text-sm text-gray-600">Project name</label>
          <input id="new-proj-name" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="e.g. Marketing Q3">`,
    onSave: async () => {
      const name = document.getElementById('new-proj-name').value.trim();
      if (!name) return;
      const proj = { id: 'proj-' + Date.now(), name };
      projects.push(proj);
      tasksByProject[proj.id] = [];
      await cloudUpsertProject(proj);
      currentProjectId = proj.id;
      renderProjectList(); renderTable(); updateStats(); save(); closeModal();
    }
  });
}

function openCloudModal() {
  openModal({ title:'Cloud Settings (Supabase)', saveLabel:'Save & Connect',
    body:`
      <p class="text-sm text-gray-500">Enter your Supabase project URL and anon key.</p>
      <label class="text-sm text-gray-600">Project URL</label>
      <input id="c-url" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm font-mono" value="${esc(cloud.url||'')}">
      <label class="text-sm text-gray-600 mt-2 block">Anon / Publishable key</label>
      <input id="c-key" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm font-mono" value="${esc(cloud.anonKey||'')}">`,
    onSave: () => {
      cloud.url     = document.getElementById('c-url').value.trim();
      cloud.anonKey = document.getElementById('c-key').value.trim();
      save(); closeModal(); initSupabase();
    }
  });
}

// ── Table ─────────────────────────────────────────────────
function applyFilters(tasks) {
  return tasks.filter(t =>
    Object.entries(filters).every(([k,vals]) => !vals?.length || vals.includes(String(t[k]||''))));
}

function renderHeaderCell(c) {
  const hf = Boolean(filters[c.id]?.length);
  return `<th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wide" style="min-width:${c.width}">
    <div class="flex items-center gap-1">
      <span>${esc(c.label)}</span>
      <button class="header-edit-icon p-0.5 hover:text-indigo-600" onclick="openColEditor('${c.id}')">✎</button>
      <button class="p-0.5 ${hf?'text-indigo-600':'text-gray-300'} hover:text-indigo-600" onclick="toggleFilterMenu('${c.id}',event)">▼</button>
    </div>
  </th>`;
}

function renderCell(task, c) {
  const v = task[c.id] ?? '';
  if (c.id==='task') return `
    <div class="flex items-center gap-1">
      <button onclick="toggleExpand(${task.id})" class="text-gray-400 hover:text-gray-600 w-4">${expandedTasks[task.id]?'▾':'▸'}</button>
      <input class="cell-input font-medium" value="${esc(v)}" onchange="updateCell(${task.id},'task',this.value)">
    </div>`;
  if (c.type==='select') {
    const opts = (c.options||[]).map(o=>`<option ${String(o)===String(v)?'selected':''}>${esc(String(o))}</option>`).join('');
    const colorMap = {
      todo:'bg-gray-100 text-gray-700', progress:'bg-blue-100 text-blue-700',
      waiting:'bg-yellow-100 text-yellow-700', done:'bg-green-100 text-green-700',
      high:'bg-red-100 text-red-700', medium:'bg-yellow-100 text-yellow-700', low:'bg-green-100 text-green-700'
    };
    return `<select class="cell-input text-xs font-medium rounded-full px-2 ${colorMap[v]||''}"
      onchange="updateCell(${task.id},'${c.id}',this.value)${c.id==='status'?';if(this.value=\'done\')confetti(this)':''}">${opts}</select>`;
  }
  if (c.type==='date') return `<input type="date" class="cell-input text-sm" value="${esc(v)}" onchange="updateCell(${task.id},'${c.id}',this.value)">`;
  return `<input class="cell-input text-sm" value="${esc(v)}" onchange="updateCell(${task.id},'${c.id}',this.value)">`;
}

function renderSubtaskRows(task) {
  const n = columns.length + 2;
  return `<tr class="bg-gray-50">
    <td colspan="${n}" class="px-8 py-3">
      <div class="space-y-1 mb-2">
        ${(task.subtasks||[]).map(s=>`
          <div class="flex items-center gap-2">
            <input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtask(${task.id},${s.id})" class="rounded">
            <input class="cell-input text-sm flex-1 ${s.done?'line-through text-gray-400':''}" value="${esc(s.title)}" onchange="editSubtask(${task.id},${s.id},this.value)">
            <button onclick="deleteSubtask(${task.id},${s.id})" class="text-gray-300 hover:text-red-500 text-xs">✕</button>
          </div>`).join('')}
      </div>
      <button onclick="addSubtask(${task.id})" class="text-xs text-indigo-600 hover:text-indigo-800">+ Add subtask</button>
    </td>
  </tr>`;
}

function renderTaskRow(t) {
  const cells = columns.map(c=>`<td class="px-2 py-2 border-b border-gray-50">${renderCell(t,c)}</td>`).join('');
  const menu  = menuOpenFor===t.id ? `
    <div class="absolute right-0 mt-1 bg-white border rounded-lg shadow-lg z-20 py-1 w-36">
      <button class="block w-full text-left px-3 py-1.5 text-sm hover:bg-gray-50" onclick="duplicateTask(${t.id})">Duplicate</button>
      <button class="block w-full text-left px-3 py-1.5 text-sm hover:bg-gray-50" onclick="addSubtask(${t.id})">Add subtask</button>
      <button class="block w-full text-left px-3 py-1.5 text-sm text-red-600 hover:bg-red-50" onclick="deleteTask(${t.id})">Delete</button>
    </div>` : '';
  return `
    <tr class="hover:bg-gray-50 transition-colors">
      ${cells}
      <td class="px-2 py-2 border-b border-gray-50">
        <div class="relative">
          <button onclick="toggleMenu(${t.id},event)" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-700">⋯</button>
          ${menu}
        </div>
      </td>
      <td class="border-b border-gray-50"></td>
    </tr>
    ${expandedTasks[t.id] ? renderSubtaskRows(t) : ''}`;
}

function renderTable() {
  const tasks = applyFilters(getTasks());
  const h = columns.map(renderHeaderCell).join('');
  const r = tasks.length
    ? tasks.map(renderTaskRow).join('')
    : `<tr><td colspan="${columns.length+2}" class="px-4 py-12 text-center text-gray-400">No tasks yet — add one above or type a command below.</td></tr>`;
  document.getElementById('table-wrap').innerHTML = `
    <table class="min-w-max w-full text-sm border-collapse">
      <thead class="sticky top-0 bg-gray-50 border-b">
        <tr>${h}
          <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Actions</th>
          <th class="px-3 py-2"><button onclick="openColCreator()" class="text-indigo-500 hover:text-indigo-700 text-lg leading-none">+</button></th>
        </tr>
      </thead>
      <tbody>${r}</tbody>
    </table>`;
}

// ── CRUD ──────────────────────────────────────────────────
async function addTaskRow(title='') {
  const task = normalizeTask({ task: title || 'New task' });
  getTasks().unshift(task);
  renderTable(); updateStats(); save();
  await cloudUpsertTask(task);
  if (title) toast('Task added');
}

async function updateCell(id, key, val) {
  const t = getTasks().find(x=>x.id===id);
  if (!t) return;
  t[key] = val;
  updateStats(); save();
  await cloudUpsertTask(t);
}

async function deleteTask(id) {
  tasksByProject[currentProjectId] = getTasks().filter(t=>t.id!==id);
  menuOpenFor = null;
  renderTable(); updateStats(); save();
  await cloudDeleteTask(id);
  toast('Task deleted');
}

function duplicateTask(id) {
  const t = getTasks().find(x=>x.id===id);
  const copy = normalizeTask({ ...t, id: Date.now() });
  getTasks().unshift(copy);
  menuOpenFor = null;
  renderTable(); updateStats(); save();
  cloudUpsertTask(copy);
  toast('Task duplicated');
}

async function addSubtask(taskId) {
  const t = getTasks().find(x=>x.id===taskId);
  t.subtasks = t.subtasks || [];
  t.subtasks.push({ id: Date.now(), title: 'New subtask', done: false });
  expandedTasks[taskId] = true;
  menuOpenFor = null;
  renderTable(); save();
  await cloudUpsertTask(t);
}

async function toggleSubtask(taskId, subId) {
  const t = getTasks().find(x=>x.id===taskId);
  const s = t.subtasks.find(x=>x.id===subId);
  if (s) { s.done = !s.done; renderTable(); save(); await cloudUpsertTask(t); }
}

async function editSubtask(taskId, subId, val) {
  const t = getTasks().find(x=>x.id===taskId);
  const s = t.subtasks.find(x=>x.id===subId);
  if (s) { s.title = val; save(); await cloudUpsertTask(t); }
}

async function deleteSubtask(taskId, subId) {
  const t = getTasks().find(x=>x.id===taskId);
  t.subtasks = t.subtasks.filter(x=>x.id!==subId);
  renderTable(); save(); await cloudUpsertTask(t);
}

function toggleExpand(id) { expandedTasks[id] = !expandedTasks[id]; renderTable(); }
function toggleMenu(id, e) { e.stopPropagation(); menuOpenFor = menuOpenFor===id?null:id; renderTable(); }

// ── Column editor ─────────────────────────────────────────
function openColCreator() {
  const id = 'col_' + Date.now();
  columns.push({ id, label:'New Column', type:'text', required:false, width:'170px' });
  Object.keys(tasksByProject).forEach(pid => tasksByProject[pid] = tasksByProject[pid].map(normalizeTask));
  renderTable(); save(); openColEditor(id);
}

function openColEditor(id) {
  const c = columns.find(x=>x.id===id); if (!c) return;
  openModal({ title:'Edit Column', showDelete:!c.required,
    body:`
      <label class="text-sm text-gray-600">Column name</label>
      <input id="col-name" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" value="${esc(c.label)}">
      <label class="text-sm text-gray-600 mt-3 block">Type</label>
      <select id="col-type" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
        ${['text','number','date','select'].map(t=>`<option value="${t}" ${c.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <label class="text-sm text-gray-600 mt-3 block">Options (for select, comma-separated)</label>
      <input id="col-opts" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" value="${esc((c.options||[]).join(', '))}" placeholder="Option A, Option B">`,
    onSave: () => {
      c.label   = document.getElementById('col-name').value.trim() || c.label;
      c.type    = document.getElementById('col-type').value;
      c.options = document.getElementById('col-opts').value.split(',').map(v=>v.trim()).filter(Boolean);
      if (c.type!=='select') c.options = [];
      renderTable(); save(); closeModal();
    },
    onDelete: () => {
      columns = columns.filter(x=>x.id!==id);
      Object.keys(tasksByProject).forEach(pid => tasksByProject[pid].forEach(t=>delete t[id]));
      renderTable(); save(); closeModal();
    }
  });
}

// ── Filters ───────────────────────────────────────────────
function toggleFilterMenu(id, e) {
  e.stopPropagation();
  const existing = document.getElementById('filter-menu-' + id);
  if (existing) { existing.remove(); return; }
  const vals = [...new Set(getTasks().map(t=>String(t[id]||'')))];
  const active = filters[id] || [];
  const menu = document.createElement('div');
  menu.id = 'filter-menu-' + id;
  menu.className = 'absolute mt-1 bg-white border rounded-lg shadow-lg z-30 p-2 w-44';
  menu.innerHTML = vals.map(v=>`
    <label class="flex items-center gap-2 text-xs py-1 hover:text-indigo-600 cursor-pointer">
      <input type="checkbox" ${active.includes(v)?'checked':''} onchange="toggleFilterVal('${id}','${String(v).replace(/'/g,"\\'")}')">
      <span>${esc(v||'(empty)')}</span>
    </label>`).join('') +
    `<button class="text-xs text-red-500 mt-1 hover:text-red-700" onclick="clearFilter('${id}')">Clear filter</button>`;
  e.currentTarget.closest('th').style.position = 'relative';
  e.currentTarget.closest('th').appendChild(menu);
}
function toggleFilterVal(id, v) { filters[id]=filters[id]||[]; filters[id]=filters[id].includes(v)?filters[id].filter(x=>x!==v):[...filters[id],v]; renderTable(); save(); }
function clearFilter(id) { delete filters[id]; renderTable(); save(); }

// ── Stats ─────────────────────────────────────────────────
function updateStats() {
  const t = getTasks();
  document.getElementById('stat-total').textContent    = t.length;
  document.getElementById('stat-progress').textContent = t.filter(x=>x.status==='progress').length;
  document.getElementById('stat-done').textContent     = t.filter(x=>x.status==='done').length;
}

// ── Confetti ──────────────────────────────────────────────
function confetti(el) {
  for (let i=0; i<8; i++) {
    const p = document.createElement('span');
    p.style.cssText = `position:fixed;pointer-events:none;width:7px;height:7px;border-radius:50%;
      background:${['#6366f1','#22c55e','#f59e0b','#ef4444'][i%4]};
      left:${el.getBoundingClientRect().left + Math.random()*40}px;
      top:${el.getBoundingClientRect().top}px;
      animation:none;z-index:9999;transition:all .7s ease-out;`;
    document.body.appendChild(p);
    setTimeout(()=>{ p.style.transform=`translate(${(Math.random()-0.5)*80}px,${-40-Math.random()*60}px)`; p.style.opacity='0'; },10);
    setTimeout(()=>p.remove(), 800);
  }
}

// ── Command bar ───────────────────────────────────────────
function extractBullets(msg) {
  const lines = msg.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const bullets = lines.filter(l=>/^[-*]\s+/.test(l)).map(l=>l.replace(/^[-*]\s+/,'').trim());
  return bullets.length ? bullets : [];
}
function cleanTitle(msg) {
  return msg.trim()
    .replace(/^(please\s+)?(create|add|new)\s+(a\s+)?task[:\s-]*/i,'')
    .replace(/\s+(by|due)\s+\w+$/i,'').trim();
}
function findTask(msg) {
  const keys = msg.toLowerCase().split(/\s+/).filter(w=>w.length>3&&!['task','done','mark','create','delete','add','new'].includes(w));
  return getTasks().find(t=>keys.some(k=>String(t.task||'').toLowerCase().includes(k))) || getTasks()[0];
}

function runPrompt() {
  const input = document.getElementById('command-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';

  const bullets = extractBullets(text);
  if (bullets.length) {
    bullets.forEach(t => addTaskRow(t));
    toast(`${bullets.length} tasks added`);
    return;
  }

  const lower = text.toLowerCase();
  if (/create|add|new/i.test(lower) && !/done|complete/i.test(lower)) {
    addTaskRow(cleanTitle(text));
  } else if (/done|complete/i.test(lower)) {
    const t = findTask(text);
    if (t) { updateCell(t.id,'status','done'); toast('Marked as done 🎉'); }
  } else if (/delete|remove/i.test(lower)) {
    const t = findTask(text);
    if (t) deleteTask(t.id);
  } else if (/high priority|urgent/i.test(lower)) {
    const t = findTask(text);
    if (t) { updateCell(t.id,'priority','high'); toast('Priority set to high'); }
  } else {
    addTaskRow(cleanTitle(text));
  }
}

// ── Load state ────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    projects         = s.projects         || projects;
    currentProjectId = s.currentProjectId || currentProjectId;
    columns          = s.columns          || columns;
    tasksByProject   = s.tasksByProject   || tasksByProject;
    filters          = s.filters          || {};
    if (s.cloud) cloud = { ...cloud, ...s.cloud };
  } catch(_) {}
}

// ── Boot ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderProjectList();
  renderTable();
  updateStats();
  lucide.createIcons();
  initSupabase();

  document.addEventListener('click', e => {
    if (!e.target.closest('[onclick*="toggleMenu"]') && !e.target.closest('.relative')) {
      if (menuOpenFor !== null) { menuOpenFor = null; renderTable(); }
    }
    if (!e.target.closest('[onclick*="toggleFilterMenu"]')) {
      document.querySelectorAll('[id^="filter-menu-"]').forEach(m=>m.remove());
    }
  });
});
</script>
</body>
